[build]
  publish = "."
  command = ""

# CSS/JS: browser must revalidate every request (fast — Netlify serves 304 via
# ETag when unchanged). Prevents the "immutable-cache holds the old bundle for a
# year" trap. When we go build-tool + content-hashed filenames we can restore
# immutable, but not before.
[[headers]]
  for = "/assets/css/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/assets/js/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Images: 1-hour cache with revalidation. Renders don't change often, but when
# we overwrite one in place we still need it to refresh within a work session.
[[headers]]
  for = "/assets/img/*"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[redirects]]
  from = "/pdf"
  to = "/pdf/index.html"
  status = 200

# Keep the internal audit / analysis exports in git but not on the public site.
[[redirects]]
  from = "/docs/*"
  to = "/404.html"
  status = 404
  force = true
