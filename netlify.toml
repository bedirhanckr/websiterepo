[build]
  publish = "."
  command = ""

[[headers]]
  for = "/assets/img/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[redirects]]
  from = "/pdf"
  to = "/pdf/index.html"
  status = 200

# Keep the internal audit / analysis exports in git but not on the public site.
[[redirects]]
  from = "/docs/*"
  to = "/404.html"
  status = 404
  force = true
